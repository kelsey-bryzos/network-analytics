name: Deploy Web to Cloudflare Pages

# Triggers: every push to `main` OR a manual run from GitHub Actions UI.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Flutter SDK ───────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'   # use latest stable; pubspec requires Dart ^3.11.3
          cache: true

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 4. Build Flutter Web ─────────────────────────────────────────────
      # The Supabase URL and anon key are already baked into env.dart as safe
      # compile-time defaults (anon keys are public by design). No secrets
      # needed for the web build itself — all sensitive ops go through Edge
      # Functions that use the service role key server-side.
      - name: Build Flutter web (release)
        run: |
          flutter build web \
            --release \
            --base-href "/"

      # ── 4b. Override cache headers for main.dart.js ──────────────────────
      # Flutter emits main.dart.js with cache-control: immutable (1 year).
      # Cloudflare Pages respects a _headers file to override per-path headers.
      # We set main.dart.js to must-revalidate so the CDN always checks for
      # a new version on each deploy, while still caching aggressively between
      # deploys. Fingerprinted chunk files (*_dart2js* etc.) keep immutable.
      - name: Inject _headers to fix main.dart.js caching
        run: |
          cat > build/web/_headers << 'EOF'
          /main.dart.js
            Cache-Control: public, max-age=0, must-revalidate
          /flutter_service_worker.js
            Cache-Control: public, max-age=0, must-revalidate
          /index.html
            Cache-Control: public, max-age=0, must-revalidate
          EOF

      # ── 5. Deploy to Cloudflare Pages ────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=network-analytics --branch=main
