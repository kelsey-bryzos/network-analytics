name: Deploy Demo to Cloudflare Pages

# Triggers: every push to `demo` branch OR a manual run from GitHub Actions UI.
on:
  push:
    branches:
      - demo
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Flutter SDK ───────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 4. Build Flutter Web (Demo) ──────────────────────────────────────
      - name: Build Flutter web (demo release)
        run: |
          flutter build web \
            --release \
            --base-href "/" \
            --dart-define=ENV=demo \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL_DEMO }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY_DEMO }}

      # ── 4b. Fingerprint + cache-bust ─────────────────────────────────────
      - name: Fingerprint main.dart.js and fix CDN caching
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSIONED="main.v${SHORT_SHA}.dart.js"

          mv build/web/main.dart.js "build/web/${VERSIONED}"
          sed -i "s|main\.dart\.js|${VERSIONED}|g" build/web/flutter_bootstrap.js
          echo "// deploy-sha: ${SHORT_SHA}" >> build/web/flutter_service_worker.js
          sed -i "s|flutter_bootstrap\.js\" async|flutter_bootstrap.js?v=${SHORT_SHA}\" async|g" build/web/index.html

          printf '/main.v*.dart.js\n  Cache-Control: public, max-age=31536000, immutable\n/flutter_service_worker.js\n  Cache-Control: public, max-age=0, must-revalidate\n/flutter_bootstrap.js\n  Cache-Control: public, max-age=0, must-revalidate\n/index.html\n  Cache-Control: public, max-age=0, must-revalidate\n/\n  Cache-Control: public, max-age=0, must-revalidate\n' > build/web/_headers

          echo "Renamed main.dart.js -> ${VERSIONED}"
          echo "Stamped SW: ${SHORT_SHA}"

      # ── 5. Deploy to Cloudflare Pages (Demo) ─────────────────────────────
      - name: Deploy to Cloudflare Pages (demo)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=network-analytics-demo --branch=demo
