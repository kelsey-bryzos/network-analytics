name: Deploy Web to Cloudflare Pages

# Triggers: every push to `main` OR a manual run from GitHub Actions UI.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Flutter SDK ───────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'   # use latest stable; pubspec requires Dart ^3.11.3
          cache: true

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 4. Build Flutter Web ─────────────────────────────────────────────
      # The Supabase URL and anon key are already baked into env.dart as safe
      # compile-time defaults (anon keys are public by design). No secrets
      # needed for the web build itself — all sensitive ops go through Edge
      # Functions that use the service role key server-side.
      - name: Build Flutter web (release)
        run: |
          flutter build web \
            --release \
            --base-href "/"

      # ── 4b. Fingerprint main.dart.js + fix CDN caching ───────────────────
      # Flutter always outputs "main.dart.js" — a fixed filename that Cloudflare
      # CDN caches with immutable (1yr). On each deploy we rename it to
      # main.v{SHORT_SHA}.dart.js (a new URL the CDN has never seen), then
      # patch flutter_bootstrap.js to load the versioned filename. This ensures
      # every deploy gets a fresh asset regardless of CDN or browser caches.
      # We also write a _headers file so future main.dart.js variants are served
      # without immutable, and index.html/SW always revalidate.
      - name: Fingerprint main.dart.js and fix CDN caching
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSIONED="main.v${SHORT_SHA}.dart.js"

          # Rename the output file
          mv build/web/main.dart.js "build/web/${VERSIONED}"

          # Patch flutter_bootstrap.js: replace the hardcoded "main.dart.js" entrypoint reference
          sed -i "s|main\\.dart\\.js|${VERSIONED}|g" build/web/flutter_bootstrap.js

          # _headers: versioned main files keep immutable; index.html + SW always revalidate
          cat > build/web/_headers << EOF
          /main.v*.dart.js
            Cache-Control: public, max-age=31536000, immutable
          /flutter_service_worker.js
            Cache-Control: public, max-age=0, must-revalidate
          /index.html
            Cache-Control: public, max-age=0, must-revalidate
          /
            Cache-Control: public, max-age=0, must-revalidate
          EOF

          echo "Renamed main.dart.js → ${VERSIONED}"
          echo "Patched flutter_bootstrap.js to load ${VERSIONED}"

      # ── 5. Deploy to Cloudflare Pages ────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=network-analytics --branch=main
