name: Deploy Web to Cloudflare Pages

# Triggers: every push to `main` OR a manual run from GitHub Actions UI.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Flutter SDK ───────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 4. Build Flutter Web ─────────────────────────────────────────────
      - name: Build Flutter web (release)
        run: |
          flutter build web \
            --release \
            --base-href "/"

      # ── 4b. Fingerprint + cache-bust ─────────────────────────────────────
      # 1. Rename main.dart.js → main.v{SHA}.dart.js (new CDN URL every deploy)
      # 2. Patch flutter_bootstrap.js to load the versioned filename
      # 3. Stamp SW bytes so changed file forces stale-SW eviction in browsers
      # 4. Add ?v=SHA to bootstrap <script> in index.html for extra bust
      # 5. Write _headers so SW/bootstrap/index.html never cache long-term
      - name: Fingerprint main.dart.js and fix CDN caching
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSIONED="main.v${SHORT_SHA}.dart.js"

          mv build/web/main.dart.js "build/web/${VERSIONED}"
          sed -i "s|main\.dart\.js|${VERSIONED}|g" build/web/flutter_bootstrap.js
          echo "// deploy-sha: ${SHORT_SHA}" >> build/web/flutter_service_worker.js
          sed -i "s|flutter_bootstrap\.js\" async|flutter_bootstrap.js?v=${SHORT_SHA}\" async|g" build/web/index.html

          printf '/main.v*.dart.js\n  Cache-Control: public, max-age=31536000, immutable\n/flutter_service_worker.js\n  Cache-Control: public, max-age=0, must-revalidate\n/flutter_bootstrap.js\n  Cache-Control: public, max-age=0, must-revalidate\n/index.html\n  Cache-Control: public, max-age=0, must-revalidate\n/\n  Cache-Control: public, max-age=0, must-revalidate\n' > build/web/_headers

          echo "Renamed main.dart.js -> ${VERSIONED}"
          echo "Patched flutter_bootstrap.js -> ${VERSIONED}"
          echo "Stamped SW: ${SHORT_SHA}"

      # ── 5. Deploy to Cloudflare Pages ────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=network-analytics --branch=main
